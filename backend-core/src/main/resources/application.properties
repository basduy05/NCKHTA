spring.application.name=eam-backend

# Database Configuration (PostgreSQL)
# Use environment variables for sensitive data in production
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/eam_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Port (Render sets PORT env var automatically)
server.port=${PORT:8080}

# CORS Configuration (Allow frontend access)
cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}
