services:
  # AI Service (FastAPI - Python)
  - type: web
    name: iedu
    env: python
    region: singapore
    plan: free
    rootDir: ai-service
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    healthCheckTimeout: 30
    healthCheckInterval: 10
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: NEO4J_DATABASE
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://nckhta-1wfu.vercel.app
      - key: EMAIL_PROVIDER
        value: brevo  # Set to 'brevo' for Render (SMTP ports are blocked on Render free tier)
      - key: BREVO_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: SENDER_NAME
        value: iEdu System
      - key: FRONTEND_URL
        value: https://nckhta-1wfu.vercel.app
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: TURSO_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
  # Backend Core (Spring Boot - User Management)
  - type: web
    name: backend-core
    env: docker
    region: singapore
    plan: free
    rootDir: backend-core
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    healthCheckTimeout: 30
    healthCheckInterval: 10
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://nckhta-1wfu.vercel.app
