version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: eam-postgres
    environment:
      POSTGRES_USER: eam_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: eam_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.12.0
    container_name: eam-neo4j
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
